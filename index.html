<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Quals Study Bible</title>

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quals">
  <meta name="theme-color" content="#fbf6ef" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1f1812" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icon-192.png">

  <script>
    (function () {
      try {
        var pref = localStorage.getItem('quals.settings');
        var parsed = pref ? JSON.parse(pref) : {};
        var theme = parsed.theme || 'auto';
        var wantsDark = theme === 'dark' ||
          (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (wantsDark) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/theme.css" />
</head>
<body>

  <div class="shell">
    <header class="status-bar">
      <div style="display:inline-flex; align-items:center; gap:10px">
        <img src="apple-touch-icon.png" alt="" width="32" height="32" style="border-radius:8px;box-shadow:0 4px 12px -4px rgba(79,70,229,0.5);display:block" />
        <span style="font-weight:800;font-size:15px;letter-spacing:-0.01em">Quals</span>
      </div>
      <button id="theme-toggle" aria-label="Toggle theme"
        style="background:var(--card);border:none;width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);box-shadow:0 4px 10px -4px rgba(42,31,20,0.15)">
        <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
    </header>

    <main class="screens" id="screens">
      <div class="screen" id="screen-home"     data-screen="home"></div>
      <div class="screen" id="screen-topics"   data-screen="topics"></div>
      <div class="screen" id="screen-cards"    data-screen="cards"></div>
      <div class="screen" id="screen-qanda"    data-screen="qanda"></div>

      <div class="screen" id="screen-tier"     data-screen="tier"></div>
      <div class="screen" id="screen-section"  data-screen="section"></div>
      <div class="screen" id="screen-deck"     data-screen="deck"></div>
      <div class="screen" id="screen-qlist"    data-screen="qlist"></div>
      <div class="screen" id="screen-settings" data-screen="settings"></div>
    </main>

    <nav class="tab-bar" aria-label="Primary">
      <button class="tab" data-target="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2h-4v-6h-6v6H5a2 2 0 01-2-2V9z"/></svg>
        <span class="tab-label">Home</span>
      </button>
      <button class="tab" data-target="topics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        <span class="tab-label">Topics</span>
      </button>
      <button class="tab" data-target="cards">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="3"/><path d="M7 8h10M7 12h6"/></svg>
        <span class="tab-label">Cards</span>
      </button>
      <button class="tab" data-target="qanda">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/><path d="M10 9h.01M13 9h.01M16 9h.01"/></svg>
        <span class="tab-label">Q&amp;A</span>
      </button>
    </nav>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
